<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナンプレモン v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#eee;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px}
h1{color:#f0c040;font-size:1.4em;margin:8px 0 4px;text-shadow:0 0 10px #f0c04088}
#game-area{width:100%;max-width:480px}
.panel{background:#16213e;border-radius:12px;padding:12px;margin:6px 0;border:1px solid #0f3460}
.panel h2{color:#e94560;font-size:1em;margin-bottom:8px}
#monster-display{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px}
#monster-img{width:100px;height:100px;object-fit:contain;image-rendering:pixelated}
#monster-info{flex:1}
#monster-name{font-size:1.1em;font-weight:bold;color:#f0c040}
#monster-level{font-size:0.85em;color:#aaa;margin-top:2px}
#monster-exp{font-size:0.8em;color:#88ccff;margin-top:4px}
.exp-bar{background:#333;border-radius:4px;height:8px;margin-top:4px;overflow:hidden}
.exp-fill{background:linear-gradient(90deg,#00f0ff,#0080ff);height:100%;transition:width 0.3s}
#sudoku-board{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#444;border:2px solid #888;margin:8px 0}
.cell{background:#1e2d4a;width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:0.9em;cursor:pointer;border:none;color:#eee;transition:background 0.15s}
.cell:hover{background:#2a3f6a}
.cell.selected{background:#0f3460;color:#f0c040}
.cell.given{color:#88ccff;font-weight:bold;cursor:default}
.cell.given:hover{background:#1e2d4a}
.cell.wrong{background:#4a1e1e;color:#ff6666}
.cell.correct{background:#1e3a2a;color:#66ff88}
.cell.thick-right{border-right:2px solid #888}
.cell.thick-bottom{border-bottom:2px solid #888}
.cell.hint{background:#2a2a1e;color:#ffee44}
#num-pad{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin:6px 0}
.num-btn{background:#0f3460;border:1px solid #1a5276;color:#eee;border-radius:4px;padding:6px 2px;cursor:pointer;font-size:0.85em;transition:background 0.15s}
.num-btn:hover{background:#1a5276}
.num-btn.active{background:#e94560}
#action-btns{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.btn{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:0.85em;font-weight:bold;transition:all 0.2s}
.btn-primary{background:#e94560;color:#fff}
.btn-primary:hover{background:#c0392b}
.btn-secondary{background:#0f3460;color:#eee;border:1px solid #1a5276}
.btn-secondary:hover{background:#1a5276}
.btn-green{background:#27ae60;color:#fff}
.btn-green:hover{background:#1e8449}
.btn-gold{background:#f39c12;color:#fff}
.btn-gold:hover{background:#d68910}
#mode-display{font-size:0.8em;color:#aaa;margin:4px 0}
#timer-display{font-size:0.85em;color:#88ccff}
#msg-area{min-height:28px;font-size:0.85em;color:#f0c040;text-align:center;padding:4px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#16213e;border:2px solid #e94560;border-radius:16px;padding:20px;max-width:360px;width:90%;text-align:center}
.modal-box h3{color:#f0c040;margin-bottom:10px;font-size:1.2em}
.modal-box p{color:#ccc;margin-bottom:12px;font-size:0.9em}
.evo-choices{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.evo-card{background:#0f3460;border:1px solid #1a5276;border-radius:10px;padding:10px;cursor:pointer;transition:all 0.2s;width:80px;text-align:center}
.evo-card:hover{background:#1a5276;border-color:#e94560}
.evo-card img{width:60px;height:60px;object-fit:contain;image-rendering:pixelated;display:block;margin:0 auto 4px}
.evo-card span{font-size:0.75em;color:#eee}
#evo-tree-panel{background:#16213e;border-radius:12px;padding:12px;margin:6px 0;border:1px solid #0f3460}
#evo-tree-panel h2{color:#e94560;font-size:1em;margin-bottom:8px}
.evo-tree-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.evo-tree-label{font-size:0.75em;color:#888;width:60px;flex-shrink:0}
.evo-tree-imgs{display:flex;gap:6px;flex-wrap:wrap}
.evo-thumb{width:40px;height:40px;object-fit:contain;image-rendering:pixelated;border-radius:6px;border:1px solid #333;background:#0a0a1a;opacity:0.35;transition:opacity 0.3s}
.evo-thumb.unlocked{opacity:1;border-color:#e94560}
#combine-btn-area{margin:6px 0}
</style>
</head>
<body>
<h1>🧩 ナンプレモン</h1>
<div id="game-area">
  <div class="panel">
    <div id="monster-display">
      <img id="monster-img" src="" alt="monster">
      <div id="monster-info">
        <div id="monster-name">タマゴン</div>
        <div id="monster-level">Lv.1 &nbsp;<span id="mode-display"></span></div>
        <div id="monster-exp">EXP: 0 / 100</div>
        <div class="exp-bar"><div class="exp-fill" id="exp-fill" style="width:0%"></div></div>
      </div>
      <div id="timer-display">00:00</div>
    </div>
    <div id="msg-area">ナンプレを解いてモンスターを育てよう！</div>
  </div>
  
  <div class="panel">
    <div id="action-btns">
      <button class="btn btn-primary" id="new-game-btn">新しいパズル</button>
      <button class="btn btn-secondary" id="hint-btn">ヒント</button>
      <button class="btn btn-secondary" id="erase-btn">消去</button>
      <button class="btn btn-secondary" id="reset-btn">リセット</button>
    </div>
    <div id="sudoku-board"></div>
    <div id="num-pad"></div>
  </div>

  <div id="combine-btn-area"></div>

  <div id="evo-tree-panel">
    <h2>📖 進化図鑑</h2>
    <div id="evo-tree"></div>
  </div>
</div>

<div id="modal" class="modal" style="display:none">
  <div class="modal-box" id="modal-box"></div>
</div>

  perfectC1:{name:'ソウルリーパー', stage:'究極体C1', img:'perfectC1'},
  perfectC2:{name:'ダークウィザード', stage:'究極体C2', img:'perfectC2'},
  perfectC3:{name:'スカルドラゴン', stage:'究極体C3', img:'perfectC3'},
  ultimate: {name:'オムニヴェロス', stage:'超究極体', img:'ultimate'},
};

// 進化ツリー
const EVO_TREE = {
  baby: {
    expNeeded: 50,
    next: [{id:'childA'},{id:'childB'},{id:'childC'}],
    choose: true
  },
  childA: {expNeeded:100, next:[{id:'adultA1'},{id:'adultA2'},{id:'adultA3'}], choose:true},
  childB: {expNeeded:100, next:[{id:'adultB1'},{id:'adultB2'},{id:'adultB3'}], choose:true},
  childC: {expNeeded:100, next:[{id:'adultC1'},{id:'adultC2'},{id:'adultC3'}], choose:true},
  adultA1:{expNeeded:200, next:[{id:'perfectA1'}]},
  adultA2:{expNeeded:200, next:[{id:'perfectA2'}]},
  adultA3:{expNeeded:200, next:[{id:'perfectA3'}]},
  adultB1:{expNeeded:200, next:[{id:'perfectB1'}]},
  adultB2:{expNeeded:200, next:[{id:'perfectB2'}]},
  adultB3:{expNeeded:200, next:[{id:'perfectB3'}]},
  adultC1:{expNeeded:200, next:[{id:'perfectC1'}]},
  adultC2:{expNeeded:200, next:[{id:'perfectC2'}]},
  adultC3:{expNeeded:200, next:[{id:'perfectC3'}]},
  perfectA1:null, perfectA2:null, perfectA3:null,
  perfectB1:null, perfectB2:null, perfectB3:null,
  perfectC1:null, perfectC2:null, perfectC3:null,
  ultimate: null,
};

// モード定義
const MODES = [
  {id:'easy',  label:'イージー',   clues:50, expMul:1,  unlockReq:null},
  {id:'normal',label:'ノーマル',   clues:40, expMul:1.5,unlockReq:null},
  {id:'super', label:'スーパー',   clues:30, expMul:2,  unlockReq:{mode:'normal',count:2}},
  {id:'expert',label:'エキスパート',clues:24, expMul:3,  unlockReq:{mode:'super', count:3}},
  {id:'crazy', label:'クレイジー',  clues:17, expMul:5,  unlockReq:{mode:'expert',count:5}},
];

// ====== State ======
const SAVE_KEY = 'npm4';
let ST = loadState();

function defaultState() {
  return {
    charId: 'baby',
    exp: 0,
    currentMode: 'easy',
    modeCounts: {},   // {easy:0,normal:0,...}
    unlockedModes: ['easy','normal'],
    evoHistory: [],   // 解放済みcharId一覧
    godCleared: false,
    // パズル状態
    puzzle: null,
    solution: null,
    userGrid: null,
    selectedCell: null,
    timer: 0,
    timerRunning: false,
    hintsLeft: 3,
  };
}

function loadState() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if (s) return Object.assign(defaultState(), JSON.parse(s));
  } catch(e){}
  return defaultState();
}

function saveState() {
  const toSave = {
    charId:ST.charId, exp:ST.exp, currentMode:ST.currentMode,
    modeCounts:ST.modeCounts, unlockedModes:ST.unlockedModes,
    evoHistory:ST.evoHistory, godCleared:ST.godCleared
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
}

// 起動時に幼年期をevoHistoryに追加
if (!ST.evoHistory.includes('baby')) ST.evoHistory.push('baby');

// ====== タイマー ======
let timerInterval = null;
function startTimer() {
  ST.timerRunning = true;
  ST.timer = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    ST.timer++;
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() {
  ST.timerRunning = false;
  clearInterval(timerInterval);
}
function updateTimerDisplay() {
  const m = Math.floor(ST.timer/60), s = ST.timer%60;
  document.getElementById('timer-display').textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

// ====== 数独生成 ======
function generateSudoku(clues) {
  // 完全解を作る
  const grid = Array.from({length:81}, ()=>0);
  solveSudoku(grid, true);
  const sol = [...grid];
  
  // clues数だけ残す
  const positions = [...Array(81).keys()];
  shuffle(positions);
  let removed = 0;
  const target = 81 - clues;
  for (const pos of positions) {
    if (removed >= target) break;
    const val = grid[pos];
    grid[pos] = 0;
    const tmp = [...grid];
    if (countSolutions(tmp, 2) === 1) {
      removed++;
    } else {
      grid[pos] = val;
    }
  }
  return {puzzle:[...grid], solution:sol};
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function solveSudoku(g, random=false) {
  const empty = g.indexOf(0);
  if (empty === -1) return true;
  const nums = [1,2,3,4,5,6,7,8,9];
  if (random) shuffle(nums);
  for (const n of nums) {
    if (isValid(g, empty, n)) {
      g[empty] = n;
      if (solveSudoku(g, random)) return true;
      g[empty] = 0;
    }
  }
  return false;
}

function countSolutions(g, max) {
  const empty = g.indexOf(0);
  if (empty === -1) return 1;
  let count = 0;
  for (let n=1;n<=9;n++) {
    if (isValid(g, empty, n)) {
      g[empty] = n;
      count += countSolutions([...g], max);
      g[empty] = 0;
      if (count >= max) return count;
    }
  }
  return count;
}

function isValid(g, pos, n) {
  const row = Math.floor(pos/9), col = pos%9;
  for (let i=0;i<9;i++) {
    if (g[row*9+i]===n) return false;
    if (g[i*9+col]===n) return false;
  }
  const br=Math.floor(row/3)*3, bc=Math.floor(col/3)*3;
  for (let r=br;r<br+3;r++)
    for (let c=bc;c<bc+3;c++)
      if (g[r*9+c]===n) return false;
  return true;
}

// ====== ボード描画 ======
function renderBoard() {
  const board = document.getElementById('sudoku-board');
  board.innerHTML = '';
  for (let i=0;i<81;i++) {
    const cell = document.createElement('button');
    cell.className = 'cell';
    const row=Math.floor(i/9), col=i%9;
    if (col===2||col===5) cell.classList.add('thick-right');
    if (row===2||row===5) cell.classList.add('thick-bottom');
    
    const pv = ST.puzzle ? ST.puzzle[i] : 0;
    const uv = ST.userGrid ? ST.userGrid[i] : 0;
    
    if (pv !== 0) {
      cell.textContent = pv;
      cell.classList.add('given');
    } else if (uv !== 0) {
      cell.textContent = uv;
      if (ST.solution && uv !== ST.solution[i]) cell.classList.add('wrong');
      else cell.classList.add('correct');
    }
    if (ST.selectedCell === i) cell.classList.add('selected');
    cell.addEventListener('click', ()=>selectCell(i));
    board.appendChild(cell);
  }
}

function selectCell(i) {
  if (ST.puzzle && ST.puzzle[i] !== 0) return;
  ST.selectedCell = i;
  renderBoard();
}

function renderNumPad() {
  const pad = document.getElementById('num-pad');
  pad.innerHTML = '';
  for (let n=1;n<=9;n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.addEventListener('click', ()=>inputNumber(n));
    pad.appendChild(btn);
  }
}

function inputNumber(n) {
  if (ST.selectedCell === null || !ST.puzzle) return;
  if (ST.puzzle[ST.selectedCell] !== 0) return;
  if (!ST.userGrid) ST.userGrid = Array(81).fill(0);
  ST.userGrid[ST.selectedCell] = n;
  renderBoard();
  checkComplete();
}

// ====== ゲームロジック ======
function newGame() {
  const mode = MODES.find(m=>m.id===ST.currentMode) || MODES[0];
  setMsg(`${mode.label}モードで新しいパズルを生成中...`);
  
  setTimeout(()=>{
    const {puzzle, solution} = generateSudoku(mode.clues);
    ST.puzzle = puzzle;
    ST.solution = solution;
    ST.userGrid = Array(81).fill(0);
    ST.selectedCell = null;
    ST.hintsLeft = 3;
    startTimer();
    renderBoard();
    renderNumPad();
    setMsg(`${mode.label}モード！全部埋めてEXPをゲット！`);
    updateUI();
  }, 50);
}

function checkComplete() {
  if (!ST.userGrid || !ST.solution || !ST.puzzle) return;
  // 全マス埋まってるか
  for (let i=0;i<81;i++) {
    const v = ST.puzzle[i] !== 0 ? ST.puzzle[i] : ST.userGrid[i];
    if (v === 0) return;
    if (v !== ST.solution[i]) return;
  }
  // クリア！
  stopTimer();
  const mode = MODES.find(m=>m.id===ST.currentMode) || MODES[0];
  const expGain = Math.round(30 * mode.expMul);
  ST.exp += expGain;
  
  // モードカウント更新
  if (!ST.modeCounts[mode.id]) ST.modeCounts[mode.id] = 0;
  ST.modeCounts[mode.id]++;
  
  // モード解放チェック
  checkModeUnlock();
  
  // GODクリア判定
  if (ST.charId === 'ultimate') ST.godCleared = true;
  
  saveState();
  
  // 進化チェック
  const evoNext = checkEvo();
  if (evoNext) {
    doEvo(evoNext);
  } else {
    showModal(`🎉 クリア！ +${expGain} EXP`, `時間: ${formatTime(ST.timer)}`, null, ()=>{
      updateUI();
      renderBoard();
    });
    updateUI();
  }
}

function checkModeUnlock() {
  for (const mode of MODES) {
    if (ST.unlockedModes.includes(mode.id)) continue;
    const req = mode.unlockReq;
    if (!req) continue;
    const count = ST.modeCounts[req.mode] || 0;
    if (count >= req.count) {
      ST.unlockedModes.push(mode.id);
      setMsg(`🔓 ${mode.label}モード解放！`);
    }
  }
}

function checkEvo() {
  const tree = EVO_TREE[ST.charId];
  if (!tree) return null;
  if (ST.exp >= tree.expNeeded) return tree;
  return null;
}

function doEvo(tree) {
  if (tree.choose && tree.next.length > 1) {
    // 分岐選択モーダル
    showEvoChoiceModal(tree.next);
  } else {
    // 自動進化
    const nextId = tree.next[0].id;
    evolve(nextId);
  }
}

function evolve(nextId) {
  const prevId = ST.charId;
  ST.charId = nextId;
  ST.exp = 0;
  if (!ST.evoHistory.includes(nextId)) ST.evoHistory.push(nextId);
  saveState();
  
  const char = CHARS[nextId];
  showModal(
    `🌟 進化！`,
    `${CHARS[prevId].name} → ${char.name}`,
    null,
    ()=>{ updateUI(); renderEvoTree(); }
  );
}

function showEvoChoiceModal(nexts) {
  const choices = nexts.map(n=>`
    <div class="evo-card" onclick="chooseEvo('${n.id}')">
      <img src="${IMGS[CHARS[n.id].img]}" alt="${CHARS[n.id].name}">
      <span>${CHARS[n.id].name}</span>
    </div>
  `).join('');
  
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <h3>⚡ 進化の選択</h3>
    <p>どのモンスターに進化する？</p>
    <div class="evo-choices">${choices}</div>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function chooseEvo(id) {
  closeModal();
  evolve(id);
}

// ヒント
function useHint() {
  if (ST.hintsLeft <= 0) { setMsg('ヒントは使い切りました'); return; }
  if (!ST.puzzle || !ST.solution) return;
  
  const empties = [];
  for (let i=0;i<81;i++) {
    if (ST.puzzle[i]===0 && (!ST.userGrid || ST.userGrid[i]===0)) empties.push(i);
  }
  if (empties.length === 0) return;
  
  const idx = empties[Math.floor(Math.random()*empties.length)];
  if (!ST.userGrid) ST.userGrid = Array(81).fill(0);
  ST.userGrid[idx] = ST.solution[idx];
  ST.hintsLeft--;
  renderBoard();
  setMsg(`ヒント使用 (残り${ST.hintsLeft}回)`);
}

// 消去
function eraseCell() {
  if (ST.selectedCell === null || !ST.puzzle) return;
  if (ST.puzzle[ST.selectedCell] !== 0) return;
  if (ST.userGrid) ST.userGrid[ST.selectedCell] = 0;
  renderBoard();
}

// リセット（同じパズルをやり直し）
function resetPuzzle() {
  if (!ST.puzzle) return;
  ST.userGrid = Array(81).fill(0);
  ST.selectedCell = null;
  startTimer();
  renderBoard();
  setMsg('リセットしました');
}

// ====== 幼年期リスタート ======
function restartFromBaby() {
  // evoHistory・モード解放・godClearedは保持
  ST.charId = 'baby';
  ST.exp = 0;
  ST.puzzle = null;
  ST.solution = null;
  ST.userGrid = null;
  if (!ST.evoHistory.includes('baby')) ST.evoHistory.push('baby');
  saveState();
  setMsg('幼年期からリスタート！');
  updateUI();
  renderEvoTree();
  document.getElementById('sudoku-board').innerHTML = '';
}

// ====== GOD合体 ======
function doCombine() {
  // perfectA/B/Cが全部揃ってるか確認
  const hasA = ST.evoHistory.some(id=>id.startsWith('perfectA'));
  const hasB = ST.evoHistory.some(id=>id.startsWith('perfectB'));
  const hasC = ST.evoHistory.some(id=>id.startsWith('perfectC'));
  
  if (!hasA||!hasB||!hasC||!ST.godCleared) {
    setMsg('条件が揃っていません');
    return;
  }
  
  ST.charId = 'ultimate';
  ST.exp = 0;
  if (!ST.evoHistory.includes('ultimate')) ST.evoHistory.push('ultimate');
  saveState();
  
  showModal('💥 超究極合体！', 'オムニヴェロスが誕生した！', null, ()=>{ updateUI(); renderEvoTree(); });
}

// ====== UI更新 ======
function updateUI() {
  const char = CHARS[ST.charId];
  const tree = EVO_TREE[ST.charId];
  const expNeeded = tree ? tree.expNeeded : 999;
  const expPct = Math.min(100, Math.round(ST.exp / expNeeded * 100));
  
  document.getElementById('monster-img').src = IMGS[char.img];
  document.getElementById('monster-name').textContent = char.name;
  document.getElementById('monster-level').innerHTML = 
    char.stage + ' &nbsp;<span id="mode-display" style="color:#f0c040">['+
    (MODES.find(m=>m.id===ST.currentMode)||MODES[0]).label+']</span>';
  document.getElementById('monster-exp').textContent = `EXP: ${ST.exp} / ${expNeeded}`;
  document.getElementById('exp-fill').style.width = expPct+'%';
  
  // 合体ボタン
  renderCombineBtn();
  
  // 幼年期リスタートボタン
  renderRestartBtn();
  
  renderEvoTree();
}

function renderCombineBtn() {
  const area = document.getElementById('combine-btn-area');
  const isPerfect = ST.charId.startsWith('perfect');
  const hasA = ST.evoHistory.some(id=>id.startsWith('perfectA'));
  const hasB = ST.evoHistory.some(id=>id.startsWith('perfectB'));
  const hasC = ST.evoHistory.some(id=>id.startsWith('perfectC'));
  
  if (isPerfect && hasA && hasB && hasC && ST.godCleared) {
    area.innerHTML = `<div class="panel"><button class="btn btn-gold" onclick="doCombine()">⚡ 3系統を合体させる！</button></div>`;
  } else {
    area.innerHTML = '';
  }
}

function renderRestartBtn() {
  // 究極体 or 完全体のときに表示
  const stage = CHARS[ST.charId].stage;
  if (stage.includes('完全体') || stage.includes('究極体') || stage.includes('超究極')) {
    // action-btns に追加
    const existing = document.getElementById('restart-baby-btn');
    if (!existing) {
      const btn = document.createElement('button');
      btn.id = 'restart-baby-btn';
      btn.className = 'btn btn-green';
      btn.textContent = '🔄 幼年期からリスタート';
      btn.onclick = restartFromBaby;
      document.getElementById('action-btns').appendChild(btn);
    }
  } else {
    const existing = document.getElementById('restart-baby-btn');
    if (existing) existing.remove();
  }
}

function renderEvoTree() {
  const tree = document.getElementById('evo-tree');
  const rows = [
    {label:'幼年期', ids:['baby']},
    {label:'成長期', ids:['childA','childB','childC']},
    {label:'完全体A', ids:['adultA1','adultA2','adultA3']},
    {label:'完全体B', ids:['adultB1','adultB2','adultB3']},
    {label:'完全体C', ids:['adultC1','adultC2','adultC3']},
    {label:'究極体A', ids:['perfectA1','perfectA2','perfectA3']},
    {label:'究極体B', ids:['perfectB1','perfectB2','perfectB3']},
    {label:'究極体C', ids:['perfectC1','perfectC2','perfectC3']},
    {label:'超究極体', ids:['ultimate']},
  ];
  
  tree.innerHTML = rows.map(row=>`
    <div class="evo-tree-row">
      <span class="evo-tree-label">${row.label}</span>
      <div class="evo-tree-imgs">
        ${row.ids.map(id=>`
          <img class="evo-thumb ${ST.evoHistory.includes(id)?'unlocked':''}"
               src="${IMGS[CHARS[id].img]}" alt="${CHARS[id].name}"
               title="${CHARS[id].name}">
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ====== モード選択 ======
function showModeSelect() {
  const btns = ST.unlockedModes.map(mid=>{
    const m = MODES.find(x=>x.id===mid);
    return `<button class="btn btn-secondary" style="margin:4px" onclick="selectMode('${mid}')">${m.label}</button>`;
  }).join('');
  
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <h3>🎮 モード選択</h3>
    <p>現在: ${(MODES.find(m=>m.id===ST.currentMode)||MODES[0]).label}</p>
    <div style="margin:10px 0">${btns}</div>
    <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function selectMode(mid) {
  ST.currentMode = mid;
  saveState();
  closeModal();
  updateUI();
  setMsg(`${(MODES.find(m=>m.id===mid)||MODES[0]).label}モードに変更しました`);
}

// ====== モーダル ======
function showModal(title, body, extraHtml, cb) {
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <h3>${title}</h3>
    <p>${body}</p>
    ${extraHtml||''}
    <button class="btn btn-primary" style="margin-top:10px" onclick="closeModal()">OK</button>
  `;
  document.getElementById('modal').style.display = 'flex';
  window._modalCb = cb;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  if (window._modalCb) { window._modalCb(); window._modalCb = null; }
}

function setMsg(txt) {
  document.getElementById('msg-area').textContent = txt;
}

function formatTime(s) {
  const m=Math.floor(s/60); return `${m}分${s%60}秒`;
}

// ====== イベント ======
document.getElementById('new-game-btn').addEventListener('click', ()=>{
  // モードが複数解放されていればモード選択を挟む
  if (ST.unlockedModes.length > 1) showModeSelect();
  else newGame();
});
document.getElementById('hint-btn').addEventListener('click', useHint);
document.getElementById('erase-btn').addEventListener('click', eraseCell);
document.getElementById('reset-btn').addEventListener('click', resetPuzzle);

// キーボード
document.addEventListener('keydown', e=>{
  if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
  if (e.key === 'Backspace' || e.key === 'Delete') eraseCell();
  const dirs = {ArrowLeft:-1,ArrowRight:1,ArrowUp:-9,ArrowDown:9};
  if (dirs[e.key] !== undefined && ST.selectedCell !== null) {
    ST.selectedCell = Math.max(0, Math.min(80, ST.selectedCell + dirs[e.key]));
    renderBoard();
  }
});

// ====== 初期化 ======
renderNumPad();
updateUI();
renderEvoTree();
setMsg('「新しいパズル」ボタンでスタート！');

</script>
